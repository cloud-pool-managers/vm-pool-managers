# Stack d'observabilité — à déployer sur une VM du projet infra (vmpoolmanager).
# Grafana (UI) + Prometheus (métriques) + Loki (logs) + Tempo (traces) + OTel Collector.
# Voir monitoring/README.md pour le déploiement.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  # Backend de traces (OTLP → stockage local, requêtable par Grafana).
  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # API de requête Tempo

  # Point d'entrée OTLP : reçoit traces/métriques/logs des services Go et les
  # répartit vers Tempo (traces) / Prometheus (métriques) / Loki (logs).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    depends_on:
      - tempo
      - loki
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC (les services Go exportent ici)
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # métriques exposées pour Prometheus

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme}
      # Datasource PostgreSQL (lecture seule) injectée dans le provisioning
      CPM_PG_HOST: ${CPM_PG_HOST}
      CPM_PG_DB: ${CPM_PG_DB:-control_center}
      CPM_PG_USER: ${CPM_PG_USER:-grafana_ro}
      CPM_PG_PASSWORD: ${CPM_PG_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  tempo-data:
