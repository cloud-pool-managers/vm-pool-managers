version: '3'

vars:
  DOTENV_PATH: '.env'

tasks:

  default:
    cmds:
    - task --list

  check_clouds:
    desc: "Vérifie que clouds.yaml existe"
    cmds:
      - '[ -f {{.OS_CLIENT_CONFIG_FILE}} ] || { echo "❌ clouds.yaml introuvable"; exit 1; }'

  setup:
    desc: "Setup initial du projet (interactif)"
    cmds:
    - '[ ! -f go.mod ] && go mod init github.com/cloud-pool-managers/vm-pool-managers || echo "go.mod exists"'
    - 'go get github.com/charmbracelet/huh@latest'
    - 'go run config.go'
    - task: check_clouds
    - task: init_control
    - task: init_micro
    - task: init_front

  init_control:
    dir: control_center
    cmds:
      - '[ ! -f go.mod ] && go mod init control_center || echo "go.mod exists"'

  init_micro:
    dir: microservices/openstack
    cmds:
      - '[ ! -f go.mod ] && go mod init vm-pool-managers/microservice || echo "go.mod exists"'

  init_front:
    dir: frontend
    cmds:
      - npm install

  build:
    desc: "Build le microservice OpenStack"
    dir: microservices/openstack
    sources:
    - "**/*.go"
    generates:
    - ./bin/app
    cmds:
    - go mod tidy
    - go build -o ./bin/app .

  backend:
    desc: "Lance le microservice OpenStack"
    deps: [build]
    dir: microservices/openstack
    cmds:
      - |
        export PORT=8080
        export DOTENV_PATH={{.DOTENV_PATH}}
        ./bin/app

  colima:start:
    desc: "Démarre Colima si pas déjà en cours"
    cmds:
      - colima status 2>/dev/null || colima start --cpu 2 --memory 4 --disk 20

  up:
    desc: "Redémarre tout : Caddy natif + Colima + Dex/GLAuth"
    cmds:
      - task caddy
      - colima stop 2>/dev/null || true
      - colima start --cpu 4 --memory 6 --disk 20
      - docker start dex glauth 2>/dev/null || task auth
      - echo "✅ Tous les services sont up"

  caddy:
    desc: "Lance Caddy natif (port 443, sans Docker)"
    cmds:
      - pkill -f "caddy-grpc run" 2>/dev/null || true
      - sleep 1
      - sudo nohup {{.HOME}}/caddy-grpc run --config {{.ROOT_DIR}}/caddy/Caddyfile.native --adapter caddyfile > /tmp/caddy-native.log 2>&1 &
      - sleep 2
      - lsof -i :443 | grep LISTEN && echo "✅ Caddy natif démarré"

  caddy:docker:
    desc: "Build et lance Caddy via Docker (fallback)"
    deps: [colima:start]
    dir: caddy
    cmds:
      - docker build -t my-caddy .
      - docker rm -f caddy 2>/dev/null || true
      - docker run -d -p 443:443 --add-host=host.docker.internal:host-gateway --name caddy -v caddy_data:/data my-caddy

  frontend:
    desc: "Lance le frontend en dev"
    dir: frontend
    cmds:
      - sudo npm run dev -- --host --port 80

  frontexpose:
    desc: "Lance le frontend exposé sur le réseau"
    dir: frontend
    cmds:
      - npm run dev -- --host

  auth:
    desc: "Lance GLAuth + Dex (Docker Compose)"
    deps: [colima:start]
    cmds:
      - docker compose -f docker-compose.auth.yaml up -d
      - echo "GLAuth LDAP sur :3893 | Dex OIDC sur http://localhost:5556/dex"

  auth:stop:
    desc: "Arrête GLAuth + Dex"
    cmds:
      - docker compose -f docker-compose.auth.yaml down

  guac:
    desc: "Lance Guacamole (guacd + guacamole-client + MySQL)"
    deps: [colima:start]
    cmds:
      - docker compose -f docker-compose.guacamole.yaml --env-file .env up -d
      - echo "Guacamole sur http://localhost:8080/guacamole (guacadmin/guacadmin)"

  guac:stop:
    desc: "Arrête Guacamole"
    cmds:
      - docker compose -f docker-compose.guacamole.yaml --env-file .env down

  guac:tunnel:
    desc: "Tunnel SSH vers Guacamole sur infra-postgres (0.0.0.0:18080 -> 157.136.249.205:8080)"
    cmds:
      - ssh -N -L 0.0.0.0:18080:127.0.0.1:8080 ubuntu@157.136.249.205

  control:
    desc: "Lance le control center"
    dir: control_center
    cmds:
    - go mod tidy
    - go run main.go

  dev:
    desc: "Lance tout (backend + control + frontend) via tmux"
    cmds:
      - |
        tmux kill-session -t poolmanager 2>/dev/null || true
        tmux new-session -d -s poolmanager

        tmux rename-window -t poolmanager:0 backend
        tmux send-keys -t poolmanager:backend "task backend" C-m

        tmux new-window -t poolmanager -n control
        tmux send-keys -t poolmanager:control \
          "until nc -z localhost 50052; do echo '...'; sleep 1; done && task control" C-m

        tmux new-window -t poolmanager -n frontend
        tmux send-keys -t poolmanager:frontend "task frontexpose" C-m

        tmux attach -t poolmanager

  clean:
    desc: "Supprime les fichiers build et DB"
    cmds:
    - rm -rf ./microservices/openstack/bin
    - rm -f ./microservices/openstack/PoolManagerVM.db

  cli:
    desc: "Ouvre le CLI OpenStack"
    cmds:
    - |
      export OS_CLIENT_CONFIG_FILE={{.OS_CLIENT_CONFIG_FILE}}
      export OS_CLOUD={{.OS_CLOUD}}
      pkgx openstack